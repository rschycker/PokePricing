<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — PokePrice Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #17181c; --panel: #1e2025; --panel2: #24262c; --text: #f4f5f7;
    --muted: #8b909a; --accent: #f8d34a; --accent2: #3d7dca; --border: #2e3138;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .login-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px 32px; width: 100%; max-width: 380px; text-align: center;
    border-top: 3px solid var(--accent);
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  p { color: var(--muted); font-size: .88rem; margin-bottom: 24px; }
  input {
    width: 100%; padding: 13px 16px; margin-bottom: 12px;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 1rem; outline: none;
  }
  input:focus { border-color: var(--accent2); }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--accent); color: #1a1f3a; font-weight: 800; font-size: 1rem;
    cursor: pointer; margin-top: 4px;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: .6; cursor: wait; }
  .error { color: #f87171; font-size: .85rem; min-height: 1.3em; margin-top: 12px; }
</style>
</head>
<body>
<form class="login-box" id="loginForm">
  <h1>Poke<span>Price</span> Lookup</h1>
  <p>Log in to continue</p>
  <input type="text" id="username" placeholder="Username" autocomplete="username" required autofocus />
  <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
  <button type="submit" id="loginBtn">Log in</button>
  <div class="error" id="error"></div>
</form>
<script>
  // If auth is disabled or already logged in, go straight to the app.
  fetch('/api/health').then((r) => r.json()).then((h) => {
    if (!h.authEnabled) location.href = '/';
  }).catch(() => {});

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    btn.disabled = true;
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (res.ok) { location.href = '/'; return; }
      errEl.textContent = data.error || 'Login failed.';
    } catch {
      errEl.textContent = 'Network error — please try again.';
    }
    btn.disabled = false;
  });
</script>
</body>
</html>
