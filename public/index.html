<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokemon Card Price Lookup</title>
<style>
  :root {
    --bg: #0f1223;
    --panel: #1a1f3a;
    --panel2: #232a4d;
    --text: #e8eaf6;
    --muted: #9aa3c7;
    --accent: #ffcb05;
    --accent2: #3d7dca;
    --green: #4ade80;
    --border: #2e3763;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1f3a 0%, #2a3260 100%);
    border-bottom: 3px solid var(--accent);
    padding: 28px 16px;
    text-align: center;
  }
  header h1 { font-size: 1.7rem; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); margin-top: 6px; font-size: .95rem; }
  .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .search-row input {
    flex: 1;
    padding: 14px 18px;
    font-size: 1.05rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    outline: none;
  }
  .search-row input:focus { border-color: var(--accent2); }
  .search-row button {
    padding: 14px 26px;
    font-size: 1.05rem;
    font-weight: 700;
    background: var(--accent);
    color: #1a1f3a;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .search-row button:hover { filter: brightness(1.1); }
  .status { color: var(--muted); font-size: .9rem; min-height: 1.4em; margin-bottom: 18px; }
  .banner {
    background: #4d3b12;
    border: 1px solid #8a6d1f;
    color: #ffe08a;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .9rem;
    margin-bottom: 18px;
    display: none;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-top { display: flex; gap: 14px; padding: 16px 16px 10px; }
  .card-top img {
    width: 86px; height: 120px; object-fit: contain;
    background: var(--panel2); border-radius: 8px; flex-shrink: 0;
  }
  .card-top .placeholder {
    width: 86px; height: 120px; border-radius: 8px; flex-shrink: 0;
    background: var(--panel2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 2rem;
  }
  .card h3 { font-size: 1.05rem; line-height: 1.25; }
  .meta { color: var(--muted); font-size: .82rem; margin-top: 5px; line-height: 1.5; }
  .market {
    margin-top: 8px; font-size: 1.25rem; font-weight: 800; color: var(--green);
  }
  .market small { font-size: .7rem; font-weight: 500; color: var(--muted); display: block; }
  .printing {
    display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 20px;
    background: var(--panel2); color: var(--accent); font-size: .72rem; font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead th {
    text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .06em;
    padding: 8px 16px 6px; border-top: 1px solid var(--border);
  }
  tbody td { padding: 6px 16px; border-top: 1px solid rgba(46,55,99,.5); }
  tbody td:last-child { text-align: right; font-weight: 600; }
  tbody tr:last-child td { padding-bottom: 14px; }
  .cond-name { color: var(--muted); }
  .na { color: #565f8a; font-weight: 400; }
  .est { color: var(--accent); margin-left: 2px; cursor: help; }
  .footnote { font-size: .72rem; padding-bottom: 14px !important; }
  .trend { font-size: .78rem; font-weight: 700; margin-left: 8px; vertical-align: middle; }
  .trend.up { color: var(--green); }
  .trend.down { color: #f87171; }
  .graded-title {
    padding: 10px 16px 4px; color: var(--accent); font-size: .72rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    border-top: 1px solid var(--border);
  }
  .graded-ui { padding: 4px 16px 12px; }
  .grader-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .grader-btns button {
    flex: 1; padding: 6px 0; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-weight: 700; font-size: .8rem;
    cursor: pointer;
  }
  .grader-btns button.active { background: var(--accent); color: #1a1f3a; border-color: var(--accent); }
  .grader-btns button:disabled { opacity: .35; cursor: not-allowed; }
  .grade-select {
    width: 100%; padding: 8px 10px; border-radius: 8px; margin-bottom: 8px;
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    font-size: .85rem;
  }
  .grade-panel { background: var(--panel2); border-radius: 10px; padding: 10px 12px; font-size: .82rem; }
  .sales-list { list-style: none; }
  .sales-list li {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid rgba(46,55,99,.5);
  }
  .sales-list li:last-child { border-bottom: none; }
  .sales-list .sale-date { color: var(--muted); }
  .sales-list b { color: var(--green); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .stats div span { color: var(--muted); font-size: .72rem; display: block; }
  .stats div b { font-size: .88rem; }
  .panel-note { color: var(--muted); font-size: .72rem; margin-top: 8px; line-height: 1.4; }
  .panel-empty { color: var(--muted); }
  .sealed-badge {
    display: inline-block; background: var(--accent2); color: #fff;
    border-radius: 6px; padding: 1px 7px; font-size: .7rem; font-weight: 700;
    vertical-align: middle;
  }
  .topnav { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
  .nav-btn {
    padding: 8px 22px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-weight: 700; font-size: .9rem;
    cursor: pointer;
  }
  .nav-btn.active { background: var(--accent); color: #1a1f3a; border-color: var(--accent); }
  .add-pf { display: flex; gap: 6px; padding: 0 16px 12px; align-items: center; }
  .add-pf select, .add-pf input {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: .8rem;
  }
  .add-pf input { width: 58px; }
  .add-pf button {
    flex: 1; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--accent2); color: #fff; font-weight: 700; font-size: .8rem;
  }
  .add-pf button:hover { filter: brightness(1.15); }
  .pf-header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 20px; margin-bottom: 16px;
  }
  .pf-total-label { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; }
  .pf-total { font-size: 1.8rem; font-weight: 800; color: var(--green); }
  .pf-header button {
    padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-weight: 700; cursor: pointer;
  }
  .pf-item {
    display: flex; gap: 12px; align-items: center;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 10px;
  }
  .pf-item img, .pf-item .placeholder {
    width: 44px; height: 62px; object-fit: contain; background: var(--panel2);
    border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .pf-info { flex: 1; min-width: 0; }
  .pf-info .name { font-weight: 700; font-size: .92rem; }
  .pf-info .sub { color: var(--muted); font-size: .76rem; margin-top: 2px; }
  .pf-qty { display: flex; align-items: center; gap: 6px; }
  .pf-qty button {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); cursor: pointer; font-weight: 700;
  }
  .pf-prices { text-align: right; min-width: 110px; }
  .pf-prices .unit { color: var(--muted); font-size: .74rem; }
  .pf-prices .line { color: var(--green); font-weight: 800; font-size: .95rem; }
  .pf-remove {
    border: none; background: none; color: #f87171; cursor: pointer; font-size: 1.1rem;
    padding: 4px 6px;
  }
  .pf-controls { display: flex; gap: 8px; margin-bottom: 10px; }
  .pf-controls input[type="text"] {
    flex: 1; padding: 10px 14px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; font-size: .9rem; outline: none;
  }
  .pf-controls input[type="text"]:focus { border-color: var(--accent2); }
  .pf-controls select, .pf-controls button {
    padding: 10px 14px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; font-size: .88rem; cursor: pointer;
  }
  .pf-controls button.filters-on { border-color: var(--accent); color: var(--accent); }
  .pf-filters {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end;
  }
  .pf-filter-group label {
    display: block; color: var(--muted); font-size: .72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
  }
  .pf-chiprow { display: flex; gap: 5px; flex-wrap: wrap; }
  .pf-chiprow button {
    padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-size: .78rem; font-weight: 600; cursor: pointer;
  }
  .pf-chiprow button.active { background: var(--accent); color: #1a1f3a; border-color: var(--accent); }
  .pf-range { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: .85rem; }
  .pf-range input {
    width: 76px; padding: 6px 8px; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; font-size: .85rem;
  }
  #pfClearFilters {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: none; color: var(--muted); font-size: .8rem; cursor: pointer;
  }
  .pf-change { font-size: .74rem; font-weight: 700; }
  .pf-change.up { color: var(--green); }
  .pf-change.down { color: #f87171; }
  .pf-change.flat { color: var(--muted); }
  .card-footer { margin-top: auto; padding: 10px 16px 14px; }
  .card-footer a { color: var(--accent2); font-size: .82rem; text-decoration: none; }
  .card-footer a:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  .spinner {
    display: none; margin: 40px auto; width: 40px; height: 40px;
    border: 4px solid var(--panel2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Poke<span>Price</span> Lookup</h1>
  <p>TCGplayer market pricing by card condition &middot; updated daily</p>
  <nav class="topnav">
    <button type="button" class="nav-btn active" data-view="search">Market Search</button>
    <button type="button" class="nav-btn" data-view="portfolio">Portfolio</button>
    <button type="button" class="nav-btn logout" id="logoutBtn" style="display:none">Log out</button>
  </nav>
</header>

<div class="container">
  <section id="view-search">
    <form class="search-row" id="searchForm">
      <input id="searchInput" type="text" placeholder="Search cards or sealed… e.g. Charizard, Umbreon VMAX, booster box" autocomplete="off" autofocus />
      <button type="submit">Search</button>
    </form>
    <div class="status" id="status"></div>
    <div class="banner" id="demoBanner"></div>
    <div class="spinner" id="spinner"></div>
    <div class="grid" id="results"></div>
    <div class="empty" id="empty">Search for a Pokemon card to see its current market pricing.</div>
  </section>

  <section id="view-portfolio" style="display:none">
    <div class="pf-header">
      <div>
        <div class="pf-total-label">Total portfolio value</div>
        <div class="pf-total" id="pfTotal">—</div>
      </div>
      <button type="button" id="pfRefresh">Refresh prices</button>
    </div>
    <div class="pf-controls">
      <input type="text" id="pfSearch" placeholder="Filter by name or set…" autocomplete="off" />
      <select id="pfSort" aria-label="Sort by">
        <option value="price_desc">Price: High to Low</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="change_desc">Price Change: High to Low</option>
        <option value="change_asc">Price Change: Low to High</option>
        <option value="pct_desc">Percent Change: High to Low</option>
        <option value="pct_asc">Percent Change: Low to High</option>
        <option value="num_asc">Card Number: Low to High</option>
        <option value="num_desc">Card Number: High to Low</option>
        <option value="name_asc">Product Name: A to Z</option>
        <option value="name_desc">Product Name: Z to A</option>
        <option value="added_desc">Date Added: Newest First</option>
        <option value="added_asc">Date Added: Oldest First</option>
      </select>
      <button type="button" id="pfFilterBtn">Filters</button>
    </div>
    <div class="pf-filters" id="pfFilters" style="display:none">
      <div class="pf-filter-group">
        <label>Product type</label>
        <div class="pf-chiprow" id="pfType">
          <button type="button" data-val="all" class="active">All</button>
          <button type="button" data-val="cards">Cards Only</button>
          <button type="button" data-val="sealed">Sealed Only</button>
        </div>
      </div>
      <div class="pf-filter-group">
        <label>Condition</label>
        <div class="pf-chiprow" id="pfCond">
          <button type="button" data-val="NM">NM</button>
          <button type="button" data-val="LP">LP</button>
          <button type="button" data-val="MP">MP</button>
          <button type="button" data-val="HP">HP</button>
          <button type="button" data-val="DM">DM</button>
          <button type="button" data-val="SEALED">Sealed</button>
        </div>
      </div>
      <div class="pf-filter-group">
        <label>Price range (each)</label>
        <div class="pf-range">$ <input type="number" id="pfPmin" min="0" placeholder="min"> to $ <input type="number" id="pfPmax" min="0" placeholder="max"></div>
      </div>
      <div class="pf-filter-group">
        <label>Quantity owned</label>
        <div class="pf-range"><input type="number" id="pfQmin" min="0" placeholder="min"> to <input type="number" id="pfQmax" min="0" placeholder="max"></div>
      </div>
      <button type="button" id="pfClearFilters">Clear filters</button>
    </div>
    <div class="status" id="pfStatus"></div>
    <div class="spinner" id="pfSpinner"></div>
    <div id="pfList"></div>
    <div class="empty" id="pfEmpty" style="display:none">Your portfolio is empty. Find items in Market Search and click "+ Portfolio".</div>
  </section>
</div>

<script>
  const form = document.getElementById('searchForm');
  const input = document.getElementById('searchInput');
  const grid = document.getElementById('results');
  const empty = document.getElementById('empty');
  const spinner = document.getElementById('spinner');
  const statusEl = document.getElementById('status');
  const banner = document.getElementById('demoBanner');

  const CONDITION_LABELS = {
    NM: 'Near Mint', LP: 'Lightly Played', MP: 'Moderately Played',
    HP: 'Heavily Played', DM: 'Damaged'
  };

  const usd = (n) => (n === null || n === undefined)
    ? '<span class="na">—</span>'
    : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  let lastQuery = null;

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (q.length < 2) { statusEl.textContent = 'Enter at least 2 characters.'; return; }
    const target = 'search=' + encodeURIComponent(q);
    if (location.hash.slice(1) === target) performSearch(q); // same query: hashchange won't fire
    else location.hash = target;
  });

  async function performSearch(q) {
    lastQuery = q;
    grid.innerHTML = '';
    empty.style.display = 'none';
    banner.style.display = 'none';
    statusEl.textContent = '';
    spinner.style.display = 'block';

    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      spinner.style.display = 'none';

      if (!res.ok) { statusEl.textContent = data.error || 'Something went wrong.'; return; }

      if (data.demoMode) {
        banner.textContent = data.note;
        banner.style.display = 'block';
      }

      if (!data.results || data.results.length === 0) {
        empty.style.display = 'block';
        empty.textContent = 'No cards found for "' + q + '". Try a different name.';
        return;
      }

      cardsData = data.results;

      statusEl.textContent = data.results.length + ' result' + (data.results.length === 1 ? '' : 's')
        + (data.creditsRemaining ? ' · API credits remaining today: ' + data.creditsRemaining : '');

      grid.innerHTML = data.results.map(renderCard).join('');
      wireGradedSections();
    } catch (err) {
      spinner.style.display = 'none';
      statusEl.textContent = 'Network error — please try again.';
    }
  }

  let cardsData = [];
  const GRADERS = ['PSA', 'BGS', 'CGC'];

  function renderCard(card, cardIdx) {
    // One card may have multiple printings (normal / holofoil / reverse holo)
    return card.variants.map((v, vi) => {
      const conds = v.conditions || {};
      const hasConds = Object.keys(conds).length > 0;
      const rows = Object.keys(CONDITION_LABELS).map((code) => `
        <tr>
          <td class="cond-name">${CONDITION_LABELS[code]}</td>
          <td>${usd(conds[code])}</td>
        </tr>`).join('');
      const missing = Object.keys(CONDITION_LABELS).some((code) => conds[code] === undefined);
      const footnote = hasConds
        ? `<tr><td colspan="2" class="cond-name footnote">TCGplayer market prices from recent sales${missing ? ' · — = no recent sales in this condition' : ''}</td></tr>`
        : '';

      return `
      <div class="card">
        <div class="card-top">
          ${card.image
            ? `<img src="${esc(card.image)}" alt="${esc(card.name)}" loading="lazy" onerror="this.outerHTML='<div class=placeholder>🃏</div>'">`
            : '<div class="placeholder">🃏</div>'}
          <div>
            <h3>${card.sealed ? '<span class="sealed-badge">📦 Sealed</span> ' : ''}${esc(card.name)}</h3>
            <div class="meta">
              ${esc(card.set)}${card.number ? ' · #' + esc(card.number) + (card.totalSetNumber ? '/' + esc(card.totalSetNumber) : '') : ''}<br>
              ${esc(card.rarity)}
            </div>
            <div class="market">${usd(v.market)}${trendBadge(v.history || card.history)}<small>TCGplayer market price</small></div>
            ${v.printing ? `<span class="printing">${esc(v.printing)}</span>` : ''}
          </div>
        </div>
        ${card.sealed
          ? `<table><tbody><tr><td class="cond-name" style="padding:8px 16px 14px;border-top:1px solid var(--border)">Sealed product — condition pricing not applicable${v.low !== null && v.low !== undefined ? ' · lowest listing ' + usd(v.low).replace(/<[^>]*>/g, '') : ''}</td></tr></tbody></table>`
          : `<table>
          <thead><tr><th>Condition</th><th style="text-align:right">Price</th></tr></thead>
          <tbody>${hasConds ? rows + footnote : `<tr><td colspan="2" class="cond-name" style="padding-bottom:14px">Condition breakdown not available for this card${v.low !== null && v.low !== undefined ? ' · lowest listing ' + usd(v.low).replace(/<[^>]*>/g, '') : ''}</td></tr>`}</tbody>
        </table>`}
        ${vi === 0 ? gradedSection(card, cardIdx) : ''}
        <div class="add-pf" data-card="${cardIdx}" data-variant="${vi}">
          ${card.sealed ? '' : `<select class="pf-cond" aria-label="Condition">${Object.keys(CONDITION_LABELS).map((c) => `<option value="${c}">${CONDITION_LABELS[c]}</option>`).join('')}</select>`}
          <input class="pf-qty-in" type="number" min="1" max="999" value="1" aria-label="Quantity">
          <button type="button" class="pf-add">+ Portfolio</button>
        </div>
        <div class="card-footer">
          ${card.tcgPlayerUrl ? `<a href="${esc(card.tcgPlayerUrl)}" target="_blank" rel="noopener">View on TCGplayer →</a>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function trendBadge(history) {
    const change = history?.change30d ?? history?.change7d;
    if (change === null || change === undefined) return '';
    const days = history?.change30d !== null && history?.change30d !== undefined ? 30 : 7;
    const up = change >= 0;
    return `<span class="trend ${up ? 'up' : 'down'}" title="Price change over last ${days} days">${up ? '▲' : '▼'} ${Math.abs(change)}% <small>(${days}d)</small></span>`;
  }

  function gradedSection(card, cardIdx) {
    if (!card.graded) return '';
    return `
      <div class="graded-title">Graded — eBay sales</div>
      <div class="graded-ui" data-idx="${cardIdx}">
        <div class="grader-btns">
          ${GRADERS.map((g) =>
            `<button type="button" data-grader="${g}" ${card.graded[g] ? '' : 'disabled title="No sales data"'}>${g}</button>`
          ).join('')}
        </div>
        <select class="grade-select" aria-label="Grade"></select>
        <div class="grade-panel"></div>
      </div>`;
  }

  function wireGradedSections() {
    document.querySelectorAll('.graded-ui').forEach((ui) => {
      const card = cardsData[Number(ui.dataset.idx)];
      if (!card || !card.graded) return;
      const btns = [...ui.querySelectorAll('.grader-btns button')];
      const select = ui.querySelector('.grade-select');
      const panel = ui.querySelector('.grade-panel');

      const selectGrader = (grader) => {
        btns.forEach((b) => b.classList.toggle('active', b.dataset.grader === grader));
        const grades = Object.keys(card.graded[grader] || {})
          .sort((a, b) => parseFloat(b) - parseFloat(a));
        select.innerHTML = grades.map((g) => `<option value="${esc(g)}">${grader} ${esc(g)}</option>`).join('');
        renderPanel(grader, grades[0]);
      };

      const renderPanel = (grader, grade) => {
        const entry = card.graded[grader]?.[grade];
        if (!entry) { panel.innerHTML = '<div class="panel-empty">No sales data for this grade.</div>'; return; }
        if (entry.recentSales && entry.recentSales.length) {
          panel.innerHTML = '<ol class="sales-list">' + entry.recentSales.map((s) => `
            <li>
              <span class="sale-date">${fmtDate(s.date)}</span>
              <b>${usd(s.price)}</b>
              ${s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">view</a>` : ''}
            </li>`).join('') + '</ol>';
          return;
        }
        panel.innerHTML = `
          <div class="stats">
            <div><span>Market price</span><b>${usd(entry.price)}</b></div>
            <div><span>7-day market</span><b>${usd(entry.market7d)}</b></div>
            <div><span>Median sale</span><b>${usd(entry.median)}</b></div>
            <div><span>Average sale</span><b>${usd(entry.average)}</b></div>
            <div><span>Total sales</span><b>${entry.count ?? '—'}</b></div>
            <div><span>Trend</span><b>${entry.trend ? esc(entry.trend) : '—'}</b></div>
            <div><span>Last sale</span><b>${fmtDate(entry.lastSale)}</b></div>
          </div>
          <div class="panel-note">Individual sold listings aren't included in the API response for this grade — showing aggregate stats from recent eBay sales.</div>`;
      };

      btns.forEach((b) => b.addEventListener('click', () => !b.disabled && selectGrader(b.dataset.grader)));
      select.addEventListener('change', () => {
        const active = btns.find((b) => b.classList.contains('active'));
        if (active) renderPanel(active.dataset.grader, select.value);
      });

      const first = GRADERS.find((g) => card.graded[g]);
      if (first) selectGrader(first);
      else { select.style.display = 'none'; panel.innerHTML = '<div class="panel-empty">No PSA/BGS/CGC sales data for this card.</div>'; }
    });
  }

  function fmtDate(d) {
    if (!d) return '—';
    const t = new Date(d);
    return isNaN(t) ? '—' : t.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ------------------------------ Navigation ------------------------------ */

  // Show logout only when auth is on; send API 401s back to the login page.
  fetch('/api/health').then((r) => r.json()).then((h) => {
    if (h.authEnabled) document.getElementById('logoutBtn').style.display = '';
  }).catch(() => {});
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await fetch('/api/logout', { method: 'POST' }); } catch {}
    location.href = '/login.html';
  });

  const views = { search: document.getElementById('view-search'), portfolio: document.getElementById('view-portfolio') };

  function showView(raw) {
    let name = raw;
    let query = null;
    let pfParams = null;
    if (raw && raw.startsWith('search=')) {
      name = 'search';
      try { query = decodeURIComponent(raw.slice(7)); } catch {}
    } else if (raw && raw.startsWith('portfolio')) {
      name = 'portfolio';
      const qi = raw.indexOf('?');
      if (qi > -1) pfParams = raw.slice(qi + 1);
    }
    if (!views[name]) name = 'search';
    document.querySelectorAll('.nav-btn:not(.logout)').forEach((b) => b.classList.toggle('active', b.dataset.view === name));
    Object.entries(views).forEach(([n, el]) => { el.style.display = n === name ? '' : 'none'; });
    if (name === 'portfolio') {
      parsePfParams(pfParams);
      syncPfControls();
      if (pfItems === null) loadPortfolio();
      else renderPfList();
    } else if (query && query.length >= 2 && query !== lastQuery) {
      input.value = query;
      performSearch(query);
    }
  }

  document.querySelectorAll('.nav-btn:not(.logout)').forEach((btn) => {
    btn.addEventListener('click', () => {
      // Keep portfolio sort/filter state when returning to the tab.
      location.hash = btn.dataset.view === 'portfolio' ? encodePfHash() : btn.dataset.view;
    });
  });

  // The hash keeps the active view across refreshes and enables back/forward.
  window.addEventListener('hashchange', () => showView(location.hash.slice(1)));
  // NOTE: initial showView() runs at the end of this script, after all state is declared.

  /* --------------------------- Add to portfolio --------------------------- */

  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('.pf-add');
    if (!btn) return;
    const wrap = btn.closest('.add-pf');
    const card = cardsData[Number(wrap.dataset.card)];
    const variant = card?.variants[Number(wrap.dataset.variant)];
    if (!card || !variant) return;
    const qty = Math.max(1, Math.min(999, Number(wrap.querySelector('.pf-qty-in').value) || 1));
    const condition = card.sealed ? 'SEALED' : wrap.querySelector('.pf-cond').value;
    btn.disabled = true;
    btn.textContent = 'Adding…';
    try {
      const res = await fetch('/api/portfolio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: card.id, sealed: !!card.sealed, name: card.name, set: card.set, number: card.number,
          printing: variant.printing, condition, qty, image: card.image, tcgPlayerUrl: card.tcgPlayerUrl,
        }),
      });
      btn.textContent = res.ok ? '✓ Added' : 'Failed';
    } catch {
      btn.textContent = 'Failed';
    }
    setTimeout(() => { btn.textContent = '+ Portfolio'; btn.disabled = false; }, 1500);
  });

  /* ------------------------------- Portfolio ------------------------------ */

  const pfList = document.getElementById('pfList');
  const pfTotal = document.getElementById('pfTotal');
  const pfStatus = document.getElementById('pfStatus');
  const pfSpinner = document.getElementById('pfSpinner');
  const pfEmpty = document.getElementById('pfEmpty');
  document.getElementById('pfRefresh').addEventListener('click', loadPortfolio);

  const CONDITION_SHORT = { NM: 'Near Mint', LP: 'Lightly Played', MP: 'Moderately Played', HP: 'Heavily Played', DM: 'Damaged', SEALED: 'Sealed' };

  /* ---- Portfolio sort/filter state (persisted in the URL hash) ---- */

  let pfItems = null;
  let pfTotalAll = 0;
  const PF_DEFAULTS = { sort: 'price_desc', q: '', type: 'all', cond: [], pmin: '', pmax: '', qmin: '', qmax: '' };
  let pfState = { ...PF_DEFAULTS, cond: [] };
  const PF_SORTS = ['price_desc','price_asc','change_desc','change_asc','pct_desc','pct_asc','num_asc','num_desc','name_asc','name_desc','added_desc','added_asc'];

  function encodePfHash() {
    const p = new URLSearchParams();
    if (pfState.sort !== PF_DEFAULTS.sort) p.set('sort', pfState.sort);
    if (pfState.q) p.set('q', pfState.q);
    if (pfState.type !== 'all') p.set('type', pfState.type);
    if (pfState.cond.length) p.set('cond', pfState.cond.join(','));
    for (const k of ['pmin', 'pmax', 'qmin', 'qmax']) if (pfState[k] !== '') p.set(k, pfState[k]);
    const s = p.toString();
    return 'portfolio' + (s ? '?' + s : '');
  }

  function pushPfHash() {
    // replaceState avoids one history entry per keystroke and hashchange loops.
    history.replaceState(null, '', '#' + encodePfHash());
  }

  function parsePfParams(str) {
    const p = new URLSearchParams(str || '');
    pfState = {
      sort: PF_SORTS.includes(p.get('sort')) ? p.get('sort') : PF_DEFAULTS.sort,
      q: p.get('q') || '',
      type: ['cards', 'sealed'].includes(p.get('type')) ? p.get('type') : 'all',
      cond: (p.get('cond') || '').split(',').filter((c) => CONDITION_SHORT[c]),
      pmin: p.get('pmin') ?? '', pmax: p.get('pmax') ?? '',
      qmin: p.get('qmin') ?? '', qmax: p.get('qmax') ?? '',
    };
  }

  function pfFiltersActive() {
    return pfState.q !== '' || pfState.type !== 'all' || pfState.cond.length > 0
      || pfState.pmin !== '' || pfState.pmax !== '' || pfState.qmin !== '' || pfState.qmax !== '';
  }

  function syncPfControls() {
    document.getElementById('pfSearch').value = pfState.q;
    document.getElementById('pfSort').value = pfState.sort;
    document.querySelectorAll('#pfType button').forEach((b) => b.classList.toggle('active', b.dataset.val === pfState.type));
    document.querySelectorAll('#pfCond button').forEach((b) => b.classList.toggle('active', pfState.cond.includes(b.dataset.val)));
    document.getElementById('pfPmin').value = pfState.pmin;
    document.getElementById('pfPmax').value = pfState.pmax;
    document.getElementById('pfQmin').value = pfState.qmin;
    document.getElementById('pfQmax').value = pfState.qmax;
    const active = pfFiltersActive();
    document.getElementById('pfFilterBtn').classList.toggle('filters-on', active);
    if (active) document.getElementById('pfFilters').style.display = '';
  }

  const numFrom = (s) => { const m = String(s || '').match(/\d+(\.\d+)?/); return m ? parseFloat(m[0]) : Infinity; };
  const PF_COMPARATORS = {
    price_desc: (a, b) => (b.unitPrice ?? -1) - (a.unitPrice ?? -1),
    price_asc: (a, b) => (a.unitPrice ?? Infinity) - (b.unitPrice ?? Infinity),
    change_desc: (a, b) => (b.unitChange ?? -Infinity) - (a.unitChange ?? -Infinity),
    change_asc: (a, b) => (a.unitChange ?? Infinity) - (b.unitChange ?? Infinity),
    pct_desc: (a, b) => (b.unitChangePct ?? -Infinity) - (a.unitChangePct ?? -Infinity),
    pct_asc: (a, b) => (a.unitChangePct ?? Infinity) - (b.unitChangePct ?? Infinity),
    num_asc: (a, b) => numFrom(a.number) - numFrom(b.number),
    num_desc: (a, b) => numFrom(b.number) === Infinity ? -1 : numFrom(b.number) - numFrom(a.number),
    name_asc: (a, b) => a.name.localeCompare(b.name),
    name_desc: (a, b) => b.name.localeCompare(a.name),
    added_desc: (a, b) => new Date(b.addedAt) - new Date(a.addedAt),
    added_asc: (a, b) => new Date(a.addedAt) - new Date(b.addedAt),
  };

  function pfFiltered() {
    return pfItems.filter((i) => {
      if (pfState.q && !(i.name + ' ' + i.set).toLowerCase().includes(pfState.q.toLowerCase())) return false;
      if (pfState.type === 'cards' && i.sealed) return false;
      if (pfState.type === 'sealed' && !i.sealed) return false;
      if (pfState.cond.length && !pfState.cond.includes(i.condition)) return false;
      if (pfState.pmin !== '' && (i.unitPrice === null || i.unitPrice < Number(pfState.pmin))) return false;
      if (pfState.pmax !== '' && (i.unitPrice === null || i.unitPrice > Number(pfState.pmax))) return false;
      if (pfState.qmin !== '' && i.qty < Number(pfState.qmin)) return false;
      if (pfState.qmax !== '' && i.qty > Number(pfState.qmax)) return false;
      return true;
    });
  }

  function changeBadge(item) {
    if (item.unitChange === null || item.unitChange === undefined) return '';
    const dir = item.unitChange > 0 ? 'up' : item.unitChange < 0 ? 'down' : 'flat';
    const arrow = item.unitChange > 0 ? '▲' : item.unitChange < 0 ? '▼' : '·';
    const pct = item.unitChangePct !== null && item.unitChangePct !== undefined ? ` (${Math.abs(item.unitChangePct)}%)` : '';
    return `<div class="pf-change ${dir}" title="Change since previous day's sales">${arrow} $${Math.abs(item.unitChange).toFixed(2)}${pct}</div>`;
  }

  function renderPfList() {
    if (pfItems === null) return;
    const shown = pfFiltered().sort(PF_COMPARATORS[pfState.sort] || PF_COMPARATORS.price_desc);
    pfTotal.textContent = '$' + Number(pfTotalAll || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    pfEmpty.style.display = pfItems.length ? 'none' : 'block';
    if (pfFiltersActive()) {
      const shownValue = shown.reduce((s, i) => s + (i.lineValue ?? 0), 0);
      pfStatus.textContent = `Showing ${shown.length} of ${pfItems.length} items · filtered value $${shownValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    } else {
      pfStatus.textContent = pfItems.length ? `${pfItems.length} item${pfItems.length === 1 ? '' : 's'}` : '';
    }
    pfList.innerHTML = shown.map((item) => `
      <div class="pf-item" data-key="${esc(item.key)}">
        ${item.image ? `<img src="${esc(item.image)}" alt="" loading="lazy">` : '<div class="placeholder">🃏</div>'}
        <div class="pf-info">
          <div class="name">${item.sealed ? '<span class="sealed-badge">📦</span> ' : ''}${esc(item.name)}</div>
          <div class="sub">${esc(item.set)}${item.number ? ' · #' + esc(item.number) : ''} · ${esc(item.printing)} · ${esc(CONDITION_SHORT[item.condition] || item.condition)}</div>
        </div>
        <div class="pf-qty">
          <button type="button" class="qty-dec" aria-label="Decrease">−</button>
          <span>${item.qty}</span>
          <button type="button" class="qty-inc" aria-label="Increase">+</button>
        </div>
        <div class="pf-prices">
          <div class="line">${usd(item.lineValue)}</div>
          <div class="unit">${usd(item.unitPrice).replace(/<[^>]*>/g, '—')} each${
            item.condition === 'SEALED' ? ''
            : item.priceBasis === 'condition' ? ' (' + esc(item.condition) + ')'
            : item.priceBasis === 'market' ? ` <span title="No current ${esc(item.condition)} sales data — using market price">(market*)</span>`
            : ''}</div>
          ${changeBadge(item)}
        </div>
        <button type="button" class="pf-remove" aria-label="Remove" title="Remove">✕</button>
      </div>`).join('');
    window.__pfItems = Object.fromEntries(shown.map((i) => [i.key, i]));
  }

  async function loadPortfolio() {
    pfSpinner.style.display = 'block';
    pfStatus.textContent = '';
    try {
      const res = await fetch('/api/portfolio');
      const data = await res.json();
      pfSpinner.style.display = 'none';
      if (!res.ok) { pfStatus.textContent = data.error || 'Could not load portfolio.'; return; }
      pfItems = data.items;
      pfTotalAll = data.totalValue;
      renderPfList();
    } catch {
      pfSpinner.style.display = 'none';
      pfStatus.textContent = 'Network error — please try again.';
    }
  }

  /* ---- Portfolio control wiring ---- */

  let pfSearchTimer = null;
  document.getElementById('pfSearch').addEventListener('input', (e) => {
    clearTimeout(pfSearchTimer);
    pfSearchTimer = setTimeout(() => { pfState.q = e.target.value.trim(); pushPfHash(); syncPfControls(); renderPfList(); }, 250);
  });
  document.getElementById('pfSort').addEventListener('change', (e) => {
    pfState.sort = e.target.value; pushPfHash(); renderPfList();
  });
  document.getElementById('pfFilterBtn').addEventListener('click', () => {
    const el = document.getElementById('pfFilters');
    el.style.display = el.style.display === 'none' ? '' : 'none';
  });
  document.getElementById('pfType').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    pfState.type = btn.dataset.val;
    pushPfHash(); syncPfControls(); renderPfList();
  });
  document.getElementById('pfCond').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const val = btn.dataset.val;
    pfState.cond = pfState.cond.includes(val) ? pfState.cond.filter((c) => c !== val) : [...pfState.cond, val];
    pushPfHash(); syncPfControls(); renderPfList();
  });
  for (const id of ['pfPmin', 'pfPmax', 'pfQmin', 'pfQmax']) {
    document.getElementById(id).addEventListener('input', (e) => {
      clearTimeout(pfSearchTimer);
      pfSearchTimer = setTimeout(() => {
        const k = { pfPmin: 'pmin', pfPmax: 'pmax', pfQmin: 'qmin', pfQmax: 'qmax' }[id];
        pfState[k] = e.target.value === '' ? '' : String(Math.max(0, Number(e.target.value)));
        pushPfHash(); renderPfList();
      }, 300);
    });
  }
  document.getElementById('pfClearFilters').addEventListener('click', () => {
    pfState = { ...PF_DEFAULTS, cond: [], sort: pfState.sort };
    pushPfHash(); syncPfControls(); renderPfList();
  });

  // Initial route — after all view/portfolio state above is declared.
  showView(location.hash.slice(1) || 'search');

  pfList.addEventListener('click', async (e) => {
    const row = e.target.closest('.pf-item');
    if (!row) return;
    const key = row.dataset.key;
    const item = window.__pfItems?.[key];
    if (!item) return;
    let action = null;
    if (e.target.closest('.qty-inc')) action = { url: '/api/portfolio/update', body: { key, qty: item.qty + 1 } };
    else if (e.target.closest('.qty-dec')) action = { url: '/api/portfolio/update', body: { key, qty: item.qty - 1 } };
    else if (e.target.closest('.pf-remove')) action = { url: '/api/portfolio/remove', body: { key } };
    if (!action) return;
    try {
      await fetch(action.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(action.body) });
      loadPortfolio();
    } catch {
      pfStatus.textContent = 'Update failed — please try again.';
    }
  });
</script>
</body>
</html>
