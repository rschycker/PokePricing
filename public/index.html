<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokemon Card Price Lookup</title>
<style>
  :root {
    --bg: #0f1223;
    --panel: #1a1f3a;
    --panel2: #232a4d;
    --text: #e8eaf6;
    --muted: #9aa3c7;
    --accent: #ffcb05;
    --accent2: #3d7dca;
    --green: #4ade80;
    --border: #2e3763;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1f3a 0%, #2a3260 100%);
    border-bottom: 3px solid var(--accent);
    padding: 28px 16px;
    text-align: center;
  }
  header h1 { font-size: 1.7rem; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); margin-top: 6px; font-size: .95rem; }
  .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .search-row input {
    flex: 1;
    padding: 14px 18px;
    font-size: 1.05rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    outline: none;
  }
  .search-row input:focus { border-color: var(--accent2); }
  .search-row button {
    padding: 14px 26px;
    font-size: 1.05rem;
    font-weight: 700;
    background: var(--accent);
    color: #1a1f3a;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .search-row button:hover { filter: brightness(1.1); }
  .status { color: var(--muted); font-size: .9rem; min-height: 1.4em; margin-bottom: 18px; }
  .banner {
    background: #4d3b12;
    border: 1px solid #8a6d1f;
    color: #ffe08a;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .9rem;
    margin-bottom: 18px;
    display: none;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-top { display: flex; gap: 14px; padding: 16px 16px 10px; }
  .card-top img {
    width: 86px; height: 120px; object-fit: contain;
    background: var(--panel2); border-radius: 8px; flex-shrink: 0;
  }
  .card-top .placeholder {
    width: 86px; height: 120px; border-radius: 8px; flex-shrink: 0;
    background: var(--panel2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 2rem;
  }
  .card h3 { font-size: 1.05rem; line-height: 1.25; }
  .meta { color: var(--muted); font-size: .82rem; margin-top: 5px; line-height: 1.5; }
  .market {
    margin-top: 8px; font-size: 1.25rem; font-weight: 800; color: var(--green);
  }
  .market small { font-size: .7rem; font-weight: 500; color: var(--muted); display: block; }
  .printing {
    display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 20px;
    background: var(--panel2); color: var(--accent); font-size: .72rem; font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead th {
    text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .06em;
    padding: 8px 16px 6px; border-top: 1px solid var(--border);
  }
  tbody td { padding: 6px 16px; border-top: 1px solid rgba(46,55,99,.5); }
  tbody td:last-child { text-align: right; font-weight: 600; }
  tbody tr:last-child td { padding-bottom: 14px; }
  .cond-name { color: var(--muted); }
  .na { color: #565f8a; font-weight: 400; }
  .est { color: var(--accent); margin-left: 2px; cursor: help; }
  .footnote { font-size: .72rem; padding-bottom: 14px !important; }
  .trend { font-size: .78rem; font-weight: 700; margin-left: 8px; vertical-align: middle; }
  .trend.up { color: var(--green); }
  .trend.down { color: #f87171; }
  .graded-title {
    padding: 10px 16px 4px; color: var(--accent); font-size: .72rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    border-top: 1px solid var(--border);
  }
  .graded-ui { padding: 4px 16px 12px; }
  .grader-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .grader-btns button {
    flex: 1; padding: 6px 0; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-weight: 700; font-size: .8rem;
    cursor: pointer;
  }
  .grader-btns button.active { background: var(--accent); color: #1a1f3a; border-color: var(--accent); }
  .grader-btns button:disabled { opacity: .35; cursor: not-allowed; }
  .grade-select {
    width: 100%; padding: 8px 10px; border-radius: 8px; margin-bottom: 8px;
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    font-size: .85rem;
  }
  .grade-panel { background: var(--panel2); border-radius: 10px; padding: 10px 12px; font-size: .82rem; }
  .sales-list { list-style: none; }
  .sales-list li {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid rgba(46,55,99,.5);
  }
  .sales-list li:last-child { border-bottom: none; }
  .sales-list .sale-date { color: var(--muted); }
  .sales-list b { color: var(--green); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .stats div span { color: var(--muted); font-size: .72rem; display: block; }
  .stats div b { font-size: .88rem; }
  .panel-note { color: var(--muted); font-size: .72rem; margin-top: 8px; line-height: 1.4; }
  .panel-empty { color: var(--muted); }
  .sealed-badge {
    display: inline-block; background: var(--accent2); color: #fff;
    border-radius: 6px; padding: 1px 7px; font-size: .7rem; font-weight: 700;
    vertical-align: middle;
  }
  .card-footer { margin-top: auto; padding: 10px 16px 14px; }
  .card-footer a { color: var(--accent2); font-size: .82rem; text-decoration: none; }
  .card-footer a:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  .spinner {
    display: none; margin: 40px auto; width: 40px; height: 40px;
    border: 4px solid var(--panel2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Poke<span>Price</span> Lookup</h1>
  <p>TCGplayer market pricing by card condition &middot; updated daily</p>
</header>

<div class="container">
  <form class="search-row" id="searchForm">
    <input id="searchInput" type="text" placeholder="Search cards or sealed… e.g. Charizard, Umbreon VMAX, booster box" autocomplete="off" autofocus />
    <button type="submit">Search</button>
  </form>
  <div class="status" id="status"></div>
  <div class="banner" id="demoBanner"></div>
  <div class="spinner" id="spinner"></div>
  <div class="grid" id="results"></div>
  <div class="empty" id="empty">Search for a Pokemon card to see its current market pricing.</div>
</div>

<script>
  const form = document.getElementById('searchForm');
  const input = document.getElementById('searchInput');
  const grid = document.getElementById('results');
  const empty = document.getElementById('empty');
  const spinner = document.getElementById('spinner');
  const statusEl = document.getElementById('status');
  const banner = document.getElementById('demoBanner');

  const CONDITION_LABELS = {
    NM: 'Near Mint', LP: 'Lightly Played', MP: 'Moderately Played',
    HP: 'Heavily Played', DM: 'Damaged'
  };

  const usd = (n) => (n === null || n === undefined)
    ? '<span class="na">—</span>'
    : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (q.length < 2) { statusEl.textContent = 'Enter at least 2 characters.'; return; }

    grid.innerHTML = '';
    empty.style.display = 'none';
    banner.style.display = 'none';
    statusEl.textContent = '';
    spinner.style.display = 'block';

    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      spinner.style.display = 'none';

      if (!res.ok) { statusEl.textContent = data.error || 'Something went wrong.'; return; }

      if (data.demoMode) {
        banner.textContent = data.note;
        banner.style.display = 'block';
      }

      if (!data.results || data.results.length === 0) {
        empty.style.display = 'block';
        empty.textContent = 'No cards found for "' + q + '". Try a different name.';
        return;
      }

      cardsData = data.results;

      statusEl.textContent = data.results.length + ' result' + (data.results.length === 1 ? '' : 's')
        + (data.creditsRemaining ? ' · API credits remaining today: ' + data.creditsRemaining : '');

      grid.innerHTML = data.results.map(renderCard).join('');
      wireGradedSections();
    } catch (err) {
      spinner.style.display = 'none';
      statusEl.textContent = 'Network error — please try again.';
    }
  });

  let cardsData = [];
  const GRADERS = ['PSA', 'BGS', 'CGC'];

  function renderCard(card, cardIdx) {
    // One card may have multiple printings (normal / holofoil / reverse holo)
    return card.variants.map((v, vi) => {
      const conds = v.conditions || {};
      const hasConds = Object.keys(conds).length > 0;
      const rows = Object.keys(CONDITION_LABELS).map((code) => `
        <tr>
          <td class="cond-name">${CONDITION_LABELS[code]}</td>
          <td>${usd(conds[code])}</td>
        </tr>`).join('');
      const missing = Object.keys(CONDITION_LABELS).some((code) => conds[code] === undefined);
      const footnote = hasConds
        ? `<tr><td colspan="2" class="cond-name footnote">TCGplayer market prices from recent sales${missing ? ' · — = no recent sales in this condition' : ''}</td></tr>`
        : '';

      return `
      <div class="card">
        <div class="card-top">
          ${card.image
            ? `<img src="${esc(card.image)}" alt="${esc(card.name)}" loading="lazy" onerror="this.outerHTML='<div class=placeholder>🃏</div>'">`
            : '<div class="placeholder">🃏</div>'}
          <div>
            <h3>${card.sealed ? '<span class="sealed-badge">📦 Sealed</span> ' : ''}${esc(card.name)}</h3>
            <div class="meta">
              ${esc(card.set)}${card.number ? ' · #' + esc(card.number) + (card.totalSetNumber ? '/' + esc(card.totalSetNumber) : '') : ''}<br>
              ${esc(card.rarity)}
            </div>
            <div class="market">${usd(v.market)}${trendBadge(v.history || card.history)}<small>TCGplayer market price</small></div>
            ${v.printing ? `<span class="printing">${esc(v.printing)}</span>` : ''}
          </div>
        </div>
        ${card.sealed
          ? `<table><tbody><tr><td class="cond-name" style="padding:8px 16px 14px;border-top:1px solid var(--border)">Sealed product — condition pricing not applicable${v.low !== null && v.low !== undefined ? ' · lowest listing ' + usd(v.low).replace(/<[^>]*>/g, '') : ''}</td></tr></tbody></table>`
          : `<table>
          <thead><tr><th>Condition</th><th style="text-align:right">Price</th></tr></thead>
          <tbody>${hasConds ? rows + footnote : `<tr><td colspan="2" class="cond-name" style="padding-bottom:14px">Condition breakdown not available for this card${v.low !== null && v.low !== undefined ? ' · lowest listing ' + usd(v.low).replace(/<[^>]*>/g, '') : ''}</td></tr>`}</tbody>
        </table>`}
        ${vi === 0 ? gradedSection(card, cardIdx) : ''}
        <div class="card-footer">
          ${card.tcgPlayerUrl ? `<a href="${esc(card.tcgPlayerUrl)}" target="_blank" rel="noopener">View on TCGplayer →</a>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function trendBadge(history) {
    const change = history?.change30d ?? history?.change7d;
    if (change === null || change === undefined) return '';
    const days = history?.change30d !== null && history?.change30d !== undefined ? 30 : 7;
    const up = change >= 0;
    return `<span class="trend ${up ? 'up' : 'down'}" title="Price change over last ${days} days">${up ? '▲' : '▼'} ${Math.abs(change)}% <small>(${days}d)</small></span>`;
  }

  function gradedSection(card, cardIdx) {
    if (!card.graded) return '';
    return `
      <div class="graded-title">Graded — eBay sales</div>
      <div class="graded-ui" data-idx="${cardIdx}">
        <div class="grader-btns">
          ${GRADERS.map((g) =>
            `<button type="button" data-grader="${g}" ${card.graded[g] ? '' : 'disabled title="No sales data"'}>${g}</button>`
          ).join('')}
        </div>
        <select class="grade-select" aria-label="Grade"></select>
        <div class="grade-panel"></div>
      </div>`;
  }

  function wireGradedSections() {
    document.querySelectorAll('.graded-ui').forEach((ui) => {
      const card = cardsData[Number(ui.dataset.idx)];
      if (!card || !card.graded) return;
      const btns = [...ui.querySelectorAll('.grader-btns button')];
      const select = ui.querySelector('.grade-select');
      const panel = ui.querySelector('.grade-panel');

      const selectGrader = (grader) => {
        btns.forEach((b) => b.classList.toggle('active', b.dataset.grader === grader));
        const grades = Object.keys(card.graded[grader] || {})
          .sort((a, b) => parseFloat(b) - parseFloat(a));
        select.innerHTML = grades.map((g) => `<option value="${esc(g)}">${grader} ${esc(g)}</option>`).join('');
        renderPanel(grader, grades[0]);
      };

      const renderPanel = (grader, grade) => {
        const entry = card.graded[grader]?.[grade];
        if (!entry) { panel.innerHTML = '<div class="panel-empty">No sales data for this grade.</div>'; return; }
        if (entry.recentSales && entry.recentSales.length) {
          panel.innerHTML = '<ol class="sales-list">' + entry.recentSales.map((s) => `
            <li>
              <span class="sale-date">${fmtDate(s.date)}</span>
              <b>${usd(s.price)}</b>
              ${s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">view</a>` : ''}
            </li>`).join('') + '</ol>';
          return;
        }
        panel.innerHTML = `
          <div class="stats">
            <div><span>Market price</span><b>${usd(entry.price)}</b></div>
            <div><span>7-day market</span><b>${usd(entry.market7d)}</b></div>
            <div><span>Median sale</span><b>${usd(entry.median)}</b></div>
            <div><span>Average sale</span><b>${usd(entry.average)}</b></div>
            <div><span>Total sales</span><b>${entry.count ?? '—'}</b></div>
            <div><span>Trend</span><b>${entry.trend ? esc(entry.trend) : '—'}</b></div>
            <div><span>Last sale</span><b>${fmtDate(entry.lastSale)}</b></div>
          </div>
          <div class="panel-note">Individual sold listings aren't included in the API response for this grade — showing aggregate stats from recent eBay sales.</div>`;
      };

      btns.forEach((b) => b.addEventListener('click', () => !b.disabled && selectGrader(b.dataset.grader)));
      select.addEventListener('change', () => {
        const active = btns.find((b) => b.classList.contains('active'));
        if (active) renderPanel(active.dataset.grader, select.value);
      });

      const first = GRADERS.find((g) => card.graded[g]);
      if (first) selectGrader(first);
      else { select.style.display = 'none'; panel.innerHTML = '<div class="panel-empty">No PSA/BGS/CGC sales data for this card.</div>'; }
    });
  }

  function fmtDate(d) {
    if (!d) return '—';
    const t = new Date(d);
    return isNaN(t) ? '—' : t.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
</script>
</body>
</html>
